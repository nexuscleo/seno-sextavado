<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Sextavado</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./img/icon-calculator.png" type="image/x-icon">
</head>
<body>
    <div class="container glass">
        <button id="botaoInstalar">Instalar APP</button>
        <header>
            <h1><span class="highlight">Calculadora Técnica</span></h1>
            <p>Geometria de Usinagem de Precisão</p>
        </header>
        
        <div class="main-content">
            <div class="controls">
                <div class="input-group">
                    <label for="forma">Forma Geométrica</label>
                    <select id="forma">
                        <option value="6">Sextavado (6 lados)</option>
                        <option value="4">Quadrado (4 lados)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="tipo">Tipo de Usinagem</label>
                    <select id="tipo">
                        <option value="externa">Externa (Vértices no Ø)</option>
                        <option value="interna">Interna (Faces no Ø)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="diametro">Medida entre Arestas/Faces (mm)</label>
                    <input type="number" id="diametro" placeholder="Ex: 19" value="19">
                </div>
                <input type="hidden" id="espessura" value="0">

                <div class="results-grid">
                    <div class="result-card"><span>Seno</span><strong id="valSeno">-</strong></div>
                    <div class="result-card"><span>Cosseno</span><strong id="valCosseno">-</strong></div>
                    <div class="result-card highlight-card"><span>Raio Real</span><strong id="valRaio">-</strong><small>mm</small></div>
                </div>
            </div>

            <div class="visualizer">
                <svg id="renderer" width="400" height="400" viewBox="0 0 400 400">
                    <polygon id="hexagono" points="" fill="rgba(0, 123, 255, 0.15)" stroke="#00d4ff" stroke-width="2" />
                    <g id="labels" style="font-size: 11px; fill: #e2e8f0; font-family: 'Segoe UI', sans-serif; font-weight: bold;"></g>
                    <circle cx="200" cy="200" r="3" fill="#ff4d4d" />
                </svg>
            </div>
        </div>
    </div>

    <footer>
        <p>Desenvolvedor: <strong>Cleomar da Silva</strong> | <span id="currentYear"></span></p>
        <p>&copy; Nexus<span class="highlight-alt">Cleo</span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

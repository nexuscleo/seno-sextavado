<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Calculadora técnica para geometria de usinagem de precisão. Calcule o raio real para usinagem de perfis sextavados e quadrados.">
    <meta name="theme-color" content="#0f172a">
    <title>Calculadora de Sextavado</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./img/icon-calculator.png" type="image/x-icon">
</head>

<body>
    <div class="container glass">
        <div class="menu-container">
            <button id="botaoMenu" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <div id="dropdownMenu" class="dropdown-content">
                <a href="#" id="menuInstalar">Instalar</a>
                <a href="#" id="menuComoUsar">Como usar</a>
                <span class="menu-version">Versão 1.0.0</span>
            </div>
        </div>
        <header>
            <h1><span class="highlight">Calculadora Técnica</span></h1>
            <p>Geometria de Usinagem de Precisão</p>
        </header>

        <main class="main-content">
            <div class="controls">
                <div class="input-group">
                    <label for="forma">Forma Geométrica</label>
                    <select id="forma">
                        <option value="6">Sextavado (6 lados)</option>
                        <option value="4">Quadrado (4 lados)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="tipo">Tipo de Usinagem</label>
                    <select id="tipo">
                        <option value="externa">Externa (Vértices no Ø)</option>
                        <option value="interna">Interna (Faces no Ø)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="diametro">Medida entre Arestas/Faces (mm)</label>
                    <input type="number" id="diametro" placeholder="Ex: 19" value="19">
                </div>
                <input type="hidden" id="espessura" value="0">

                <div class="results-grid">
                    <div class="result-card"><span>Seno</span><strong id="valSeno">-</strong></div>
                    <div class="result-card"><span>Cosseno</span><strong id="valCosseno">-</strong></div>
                    <div class="result-card highlight-card"><span>Raio Real</span><strong
                            id="valRaio">-</strong><small>mm</small></div>
                </div>
            </div>

            <div class="visualizer">
                <svg id="renderer" width="400" height="400" viewBox="0 0 400 400">
                    <polygon id="hexagono" points="" fill="rgba(0, 123, 255, 0.15)" stroke="#00d4ff" stroke-width="2" />
                    <g id="labels"
                        style="font-size: 11px; fill: #e2e8f0; font-family: 'Segoe UI', sans-serif; font-weight: bold;">
                    </g>
                    <circle cx="200" cy="200" r="3" fill="#ff4d4d" />
                </svg>
            </div>
        </main>
    </div>

    <div id="modalInfo" class="modal-overlay">
        <div class="modal-glass">
            <div id="conteudoTexto" class="modal-content">

            </div>
            <button class="btn-fechar-modal" onclick="fecharModal()">Entendi</button>
        </div>
    </div>

    <footer>
        <p><strong>Cleomar da Silva</strong> | <span id="currentYear"></span> &copy; Nexus<span
                class="highlight-alt">Cleo</span></p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
